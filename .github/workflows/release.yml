name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write # create the release and upload assets
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm ci
      - run: npm test
      - run: npm run build
      # node-gyp needs distutils, removed from Python 3.12 — setuptools restores it
      - run: python3 -m pip install --break-system-packages setuptools || python3 -m pip install setuptools
      - run: npx electron-builder --mac --publish never
      - name: checksums
        run: cd release && shasum -a 256 *.zip > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/checksums.txt
