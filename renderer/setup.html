<!doctype html>
<html><head><meta charset="utf-8"><style>
  body { font: 14px -apple-system, sans-serif; margin: 24px; }
  h3 { margin: 0 0 4px; }
  h3 + h3, #stt { margin-top: 20px; }
  .perm { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; }
  .perm button { margin-left: auto; }
  .row { padding: 8px 0 4px; }
  .indent { margin: 0 0 8px 24px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .indent input[type="text"], .indent input[type="password"] { flex: 1 1 140px; min-width: 120px; }
  #stt-summary, #llm-summary { display: none; align-items: center; gap: 10px; padding: 10px 0; }
  #local-prog { width: 100%; display: none; }
  .err { color: #c00; min-height: 1.2em; margin: 4px 0 0; font-size: 12px; }
  .note { color: #888; font-size: 12px; }
  #hint { color: #666; min-height: 2.6em; margin: 12px 0 0; }
  #done { width: 100%; padding: 10px; display: none; }
</style></head>
<body>
  <h3>1. Permissions</h3>
  <div class="perm" data-k="microphone"><span class="state">⬜</span> 🎤 Microphone <button>Request</button></div>
  <div class="perm" data-k="accessibility"><span class="state">⬜</span> ♿ Accessibility <button>Open Settings</button></div>

  <h3 style="margin-top:20px">2. Speech-to-text</h3>
  <div id="stt-summary"><span class="state">✅</span> <span id="stt-current"></span> <button id="stt-change" style="margin-left:auto">Change</button></div>
  <div id="stt-form">
    <div class="row"><label><input type="radio" name="sttmode" value="local" checked> <b>Local Whisper</b> — private, runs on this Mac, no API key</label></div>
    <div class="indent" id="local-opts">
      <select id="local-model"></select>
      <button id="local-go">Download &amp; use</button>
      <progress id="local-prog" max="100" value="0"></progress>
    </div>
    <div class="row"><label><input type="radio" name="sttmode" value="cloud"> <b>Cloud API</b> — your own key, faster on older Macs</label></div>
    <div class="indent" id="cloud-opts" style="display:none">
      <select id="cloud-provider"><option value="openai">OpenAI</option><option value="groq">Groq</option><option value="deepgram">Deepgram</option></select>
      <input id="cloud-model" type="text">
      <input id="cloud-key" type="password" placeholder="API key (stored in macOS Keychain)">
      <button id="cloud-go">Save</button>
    </div>
  </div>
  <div id="stt-error" class="err"></div>

  <h3 style="margin-top:20px">3. Formatting <span class="note">(optional)</span></h3>
  <div id="llm-summary"><span class="state">✅</span> <span id="llm-current"></span> <button id="llm-change" style="margin-left:auto">Change</button> <button id="llm-off">Disable</button></div>
  <div id="llm-form">
    <div class="note">An LLM pass that strips filler words ("uhm…") and fixes punctuation. Skip it and shhh pastes the raw transcription as-is.</div>
    <div class="indent" style="margin-left:0;margin-top:8px">
      <select id="llm-provider"><option value="anthropic">Anthropic</option><option value="openai">OpenAI</option></select>
      <input id="llm-model" type="text">
      <input id="llm-key" type="password" placeholder="API key (stored in macOS Keychain)">
      <button id="llm-go">Save</button>
    </div>
  </div>
  <div id="llm-error" class="err"></div>

  <p id="hint"></p>
  <button id="done">Done</button>
  <script type="module" src="setup.js"></script>
</body></html>
